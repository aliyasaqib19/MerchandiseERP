[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd server && npm install",
  "cd client && npm install"
]

[phases.build]
cmds = [
  "cd client && npm run build",
  "cp -r client/dist server/public",
  "cd server && npx prisma generate"
]

[start]
cmd = "cd server && npx prisma migrate deploy && node prisma/seed.js; node src/index.js"
