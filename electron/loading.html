<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchandise ERP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1e293b;
      color: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      background: #3b82f6;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
    }

    .logo-wrap svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      font-size: 12px;
      color: #64748b;
      min-height: 18px;
      text-align: center;
      transition: color 0.2s;
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 10px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
      <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
    </svg>
  </div>

  <h1>Merchandise ERP</h1>
  <p class="tagline">ENTERPRISE OPERATIONS &amp; RESOURCE PLATFORM</p>

  <div class="spinner"></div>
  <p id="status">Initializing...</p>

  <span class="version">v1.0.0</span>
</body>
</html>
